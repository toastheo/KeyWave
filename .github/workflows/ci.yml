name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSYS2 UCRT64
            os: windows-latest
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-fluidsynth

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config libgl1-mesa-dev libwayland-dev libxkbcommon-dev libgtk-3-dev xorg-dev libfluidsynth-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja pkg-config fluid-synth

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D KEYWAVE_ENABLE_AUDIO=ON

      - name: Configure CMake
        if: runner.os != 'Windows'
        run: cmake -S . -B build -G Ninja -D CMAKE_BUILD_TYPE=Release -D KEYWAVE_ENABLE_AUDIO=ON

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Build
        if: runner.os != 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure

      - name: Run tests
        if: runner.os != 'Windows'
        run: ctest --test-dir build --build-config Release --output-on-failure
