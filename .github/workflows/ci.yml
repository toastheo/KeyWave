name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            cmake-generator: ""
          - name: Linux
            os: ubuntu-latest
            cmake-generator: "-G Ninja"
          - name: macOS
            os: macos-latest
            cmake-generator: "-G Ninja"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libwayland-dev libxkbcommon-dev libgtk-3-dev xorg-dev

      - name: Configure CMake
        run: cmake -S . -B build ${{ matrix.cmake-generator }} -D CMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure
